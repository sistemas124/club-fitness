{% block contenido %}
<div style="background-color: #1a1a1a; color: white; padding: 40px; margin-top: 80px;">
    <h2>🩺 Validar y Registrar Certificado Médico Obligatorio</h2>
    <hr style="border-color: #f34e3a;">
    <form method="POST" enctype="multipart/form-data" style="max-width: 60px0px;">
        {% csrf_token %}
        <div class="form-group mb-3">
            <label>Seleccionar Socio:</label>
            <select name="socio" class="form-control" required>
                {% for socio in socios %}
                    <option value="{{ socio.id }}">{{ socio.nombres_apellidos }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group mb-3">
            <label>Certificado Médico Externo (PDF obligatorio):</label>
            <input type="file" name="certificado_pdf" class="form-control" accept="application/pdf" required>
        </div>
        <div class="form-group mb-3">
            <label>Presión Arterial:</label>
            <input type="text" name="presion_arterial" placeholder="Ej: 120/80" class="form-control" required>
        </div>
        <div class="form-group mb-3">
            <label>Nivel de Aptitud Física (Control de Puerta):</label><br>
            <input type="radio" name="nivel_aptitud" value="Apto" checked> Apto para entrenar ¡Pasar! 🟢
            <input type="radio" name="nivel_aptitud" value="Restringido" class="ms-3"> Restringido (Bloqueo Torniquete) 🔴
        </div>
        <div class="form-group mb-3">
            <label>Fecha de Evaluación:</label>
            <input type="date" name="fecha_evaluacion" class="form-control" required>
        </div>
        <div class="form-group mb-3">
            <label>Observaciones Médicas:</label>
            <textarea name="observaciones" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn" style="background-color: #f34e3a; color: white;">Guardar Evaluación</button>
    </form>
</div>
{% endblock %}
